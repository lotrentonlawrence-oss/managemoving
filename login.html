<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Login | Sweet Home Transitions</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="portal.css">
</head>
<body>
  <main class="portal-auth">
    <div class="auth-card">
      <h1>Portal Login</h1>
      <p class="muted">Sign in to access your move dashboard.</p>
      <form id="loginForm">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" required autocomplete="username">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" required autocomplete="current-password">
        <button type="submit">Sign In</button>
      </form>
      <p class="form-note" id="loginNote"></p>
      <p class="back-link"><a href="./index.html">Back to website</a></p>
    </div>
  </main>
  <script type="module" src="login.js"></script>
</body>
</html>
